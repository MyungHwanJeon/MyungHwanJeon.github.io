              <ul>
                <li><U><b>Myung-Hwan Jeon</b></U>, Jeongyun Kim and Ayoung Kim, <a href="https://rpm.snu.ac.kr/publications/mjeon-2022-ral.pdf">"Ambiguity-Aware Multi-Object Pose Optimization for Visually-Assisted Robot Manipulation",</a>, in IEEE Robotics and Automation Letters, 2022. </li>
              </ul>    
            </div>
          </div>        
          
